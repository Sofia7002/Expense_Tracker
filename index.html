<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expence Tarckrer</title>
    <link rel="stylesheet" href="style.css">
    <!-- fonts import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
         
        <div class="balance-container">
           <h2>Balance</h2>
           <h1 id="balance">&#8377;<span class="money">0.00</span></h1>
           <div class="summary">
             <div class="income">
                <h3>Income</h3>
                <p id="income-amount">&#8377;<span class="money">0.00</span></p>
             </div>
             <div class="expenses">
                <h3>Expenses</h3>
                <p id="expenses-amount">&#8377;<span class="money">0.00</span></p>
            </div>

            </div>

        </div>
        <div class="transaction-container">
            <h2>Transactions</h2>
            <ul id="transaction-list">
                <li></li>
            </ul>

        </div>
        <div class="add-transaction-container">
            <h2>Add Transactions</h2>
            <form id="transaction-form">
                <div id="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" autocomplete="off" placeholder="Enter description......" required>
                </div>
                <div id="form-group">
                    <label for="Amount">Amount</label>
                    <input type="number" id="Amount" placeholder="Enter amount ...." required>
                    <small>Use negative (-) for expences</small>
                </div>
                <button type="button" id="addBtn">Add Transaction</button>
            </form>
        </div>


    </div>
 <script src="script.js"></script>
    
</body>
</html>
